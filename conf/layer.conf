# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-spu-custom"
BBFILE_PATTERN_meta-spu-custom = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-spu-custom = "6"

LAYERDEPENDS_meta-spu-custom = "core"
LAYERVERSION_meta-spu-custom = "1"

LAYERSERIES_COMPAT_meta-spu-custom = "scarthgap"
